<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Ventas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #4f8ef7;
      --accent2:   #34d399;
      --danger:    #f87171;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --header-h:  64px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: .03em; }
    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.85); }
    }

    /* ── MAIN ── */
    main { padding: 32px; max-width: 1100px; margin: 0 auto; }

    /* ── LOADING / ERROR ── */
    #state-msg {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 14px;
    }
    #state-msg.error { color: var(--danger); }

    /* ── TABLE WRAPPER ── */
    #table-wrap { display: none; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    thead th {
      padding: 10px 18px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }

    /* separador visual cada 3 filas */
    tbody tr.separator td {
      border-top: 2px solid var(--border);
    }

    td {
      padding: 12px 18px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      white-space: nowrap;
    }
    td:first-child {
      text-align: left;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      min-width: 180px;
    }

    /* colores por valor */
    .pos { color: var(--accent2); }
    .neg { color: var(--danger); }
    .neutral { color: var(--text); }

    /* fila resaltada (última fila = resultado final) */
    tr.highlight td {
      background: rgba(79,142,247,.07);
      font-weight: 600;
      color: var(--accent);
    }
    tr.highlight td:first-child { color: var(--accent); }

    /* ── FOOTER INFO ── */
    .footer-meta {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .refresh-bar {
      display: flex; align-items: center; gap: 8px;
    }
    .bar-track {
      width: 80px; height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .5s linear;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <h1>Dashboard · Resultados</h1>
  </div>
  <div class="status">
    <div class="pulse"></div>
    <span id="last-update">Cargando…</span>
  </div>
</header>

<main>
  <div id="state-msg">Conectando con Google Sheets…</div>

  <div id="table-wrap">
    <p class="section-label">Estado de resultados — 2026</p>
    <div class="table-scroll">
      <table id="data-table">
        <thead id="thead-row"></thead>
        <tbody id="tbody-data"></tbody>
      </table>
    </div>
    <div class="footer-meta">
      <span id="row-count"></span>
      <div class="refresh-bar">
        <span>próx. actualización</span>
        <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
        <span id="countdown">30s</span>
      </div>
    </div>
  </div>
</main>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const SHEET_ID   = '19XUQVNAq5YEgvVUZOP8I9UFWf1InHMpRY5O4KwLjSFM';
  const SHEET_NAME = 'Hoja 1';
  const INTERVAL   = 30; // segundos entre refresco
  // ────────────────────────────────────────────────────────────

  const csvURL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

  let countdown = INTERVAL;
  let timerID;

  function parseCSV(text) {
    return text.trim().split('\n').map(row =>
      row.match(/(".*?"|[^",]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g)
         ?.map(v => v.replace(/^"|"$/g, '').trim()) ?? []
    );
  }

  function formatNumber(val) {
    const n = parseFloat(val.replace(/[^0-9.\-]/g, ''));
    if (isNaN(n)) return { text: val, cls: 'neutral' };
    const formatted = n.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    return { text: formatted, cls: n > 0 ? 'pos' : n < 0 ? 'neg' : 'neutral' };
  }

  async function fetchData() {
    try {
      const res = await fetch(csvURL + '&_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);
      if (!rows.length) throw new Error('Sin datos');
      renderTable(rows);
      document.getElementById('last-update').textContent =
        'Actualizado ' + new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    } catch (e) {
      // Si ya hay datos en pantalla, no los borramos — solo avisamos sutilmente
      const tableVisible = document.getElementById('table-wrap').style.display === 'block';
      if (tableVisible) {
        document.getElementById('last-update').textContent = '⚠️ Sin conexión — reintentando…';
      } else {
        document.getElementById('state-msg').textContent =
          '⚠️  No se pudo conectar con el Sheet. Verificá que sea público y el nombre de la hoja sea exacto.';
        document.getElementById('state-msg').className = 'error';
      }
    }
  }

  function renderTable(rows) {
    document.getElementById('state-msg').style.display = 'none';
    document.getElementById('table-wrap').style.display = 'block';

    const header = rows[0];
    const data   = rows.slice(1);

    // Thead
    const thead = document.getElementById('thead-row');
    thead.innerHTML = '<tr>' + header.map((h,i) =>
      `<th>${h || (i === 0 ? 'Concepto' : '')}</th>`
    ).join('') + '</tr>';

    // Tbody
    const tbody = document.getElementById('tbody-data');
    tbody.innerHTML = '';
    data.forEach((row, idx) => {
      const tr = document.createElement('tr');
      const isLast = idx === data.length - 1;
      if (isLast) tr.classList.add('highlight');

      row.forEach((cell, i) => {
        const td = document.createElement('td');
        if (i === 0) {
          td.textContent = cell;
        } else {
          const { text, cls } = formatNumber(cell);
          td.textContent = text;
          if (!isLast) td.classList.add(cls);
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    document.getElementById('row-count').textContent =
      `${data.length} conceptos · ${header.length - 1} períodos`;
  }

  function startCountdown() {
    clearInterval(timerID);
    countdown = INTERVAL;
    timerID = setInterval(() => {
      countdown--;
      document.getElementById('countdown').textContent = countdown + 's';
      document.getElementById('bar-fill').style.width =
        ((INTERVAL - countdown) / INTERVAL * 100) + '%';
      if (countdown <= 0) {
        countdown = INTERVAL;
        fetchData();
      }
    }, 1000);
  }

  // Arranque
  fetchData();
  startCountdown();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Estado de Resultados · USD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0d12;
    --surface:   #15171f;
    --surface2:  #1c1f29;
    --border:    #272b36;
    --accent:    #5b8def;
    --accent-dim:#5b8def22;
    --pos:       #34d399;
    --neg:       #f87171;
    --text:      #e7e9ee;
    --muted:     #7a8094;
    --muted2:    #4d525f;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .brand h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  .brand span { font-size: 11.5px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .live {
    display: flex; align-items: center; gap: 7px;
    font-size: 11.5px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--pos);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  main { padding: 28px 32px 48px; max-width: 1180px; margin: 0 auto; }

  /* ── PERIOD SELECTOR ── */
  .period-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .period-label {
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin-right: 6px;
  }
  .period-chip {
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .period-chip:hover { border-color: var(--accent); color: var(--text); }
  .period-chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .period-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .mode-toggle {
    display: flex; gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 2px;
    margin-left: auto;
  }
  .mode-btn {
    padding: 6px 12px;
    border-radius: 5px;
    font-size: 11.5px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .mode-btn.active { background: var(--accent); color: #0b0d12; font-weight: 500; }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--surface);
    padding: 18px 20px;
  }
  .kpi-label {
    font-size: 10.5px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: 'DM Mono', monospace;
    font-size: 21px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .kpi-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* ── TABLE ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-size: 13px; font-weight: 600; }
  .panel-title span { color: var(--muted); font-weight: 400; margin-left: 6px; }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead th {
    padding: 10px 18px;
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--surface2);
  }
  thead th:first-child { text-align: left; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.025); }

  td {
    padding: 11px 18px;
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    white-space: nowrap;
  }
  td:first-child {
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    min-width: 200px;
  }

  .pos { color: var(--pos); }
  .neg { color: var(--neg); }
  .neutral { color: var(--text); }
  .dim { color: var(--muted2); }

  tr.subtotal td { color: var(--text); font-weight: 600; }
  tr.subtotal { border-top: 1px solid var(--border); }
  tr.highlight td {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 700;
    font-size: 13.5px;
  }
  tr.highlight td:first-child { color: var(--accent); }

  .footer-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 18px;
    font-size: 11px; color: var(--muted2);
    font-family: 'DM Mono', monospace;
  }

  #state-msg { text-align: center; padding: 100px 0; color: var(--muted); font-size: 14px; }
  #state-msg.error { color: var(--neg); }
  #dashboard { display: none; }

  @media (max-width: 720px) {
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    main { padding: 20px 16px 40px; }
    header { padding: 20px 16px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <h1>Estado de Resultados</h1>
      <span>USD · Datos en vivo desde Google Sheets</span>
    </div>
  </div>
  <div class="live">
    <div class="live-dot"></div>
    <span id="last-update">Cargando…</span>
  </div>
</header>

<main>
  <div id="state-msg">Conectando con Google Sheets…</div>

  <div id="dashboard">
    <div class="period-bar" id="period-bar"></div>

    <div class="kpi-strip" id="kpi-strip"></div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Detalle<span id="panel-sub"></span></div>
      </div>
      <div class="table-scroll">
        <table>
          <thead id="thead-row"></thead>
          <tbody id="tbody-data"></tbody>
        </table>
      </div>
    </div>

    <div class="footer-meta">
      <span id="row-count"></span>
      <span id="countdown-label">próx. actualización en <span id="countdown">30s</span></span>
    </div>
  </div>
</main>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const SHEET_ID   = '1SF4HkZyqPIhLbSRMrMo7HcsAptvtgF8oItdnNLFymR0';
  const SHEET_NAME = 'Estado de Resultados USD';
  const INTERVAL   = 30;
  // ────────────────────────────────────────────────────────────

  const csvURL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

  // Filas que nos interesan del estado de resultados (en orden)
  const ROW_MAP = [
    { label: 'Ingresos por Ventas',       key: 'Total Ingresos por Ventas', type: 'normal' },
    { label: 'Costo de Ventas',           key: 'Total Costo de Ventas',     type: 'normal' },
    { label: 'Resultado Bruto',           key: 'Resultado Bruto',           type: 'subtotal' },
    { label: 'Gastos',                    key: 'Total Gastos',              type: 'normal' },
    { label: 'Otros Ingresos y Egresos',  key: 'Otros Ingresos y Egresos',  type: 'normal' },
    { label: 'EBITDA',                    key: 'EBITDA',                    type: 'subtotal' },
    { label: 'Resultados Financieros',    key: 'Resultados Financieros',    type: 'normal' },
    { label: 'Resultado Neto',            key: 'Resultado Neto',            type: 'highlight' },
  ];

  let monthCols = [];      // [{idx, label, key}]
  let dataRows  = {};      // label -> array de valores alineados con monthCols
  let selectedIdx = null;  // índice de mes seleccionado
  let mode = 'single';     // 'single' | 'range'
  let rangeStart = null, rangeEnd = null;
  let countdown = INTERVAL, timerID;

  const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const MES_KEYS = {
    'ene':0,'feb':1,'mar':2,'abr':3,'may':4,'jun':5,
    'jul':6,'ago':7,'sep':8,'sept':8,'oct':9,'nov':10,'dic':11
  };

  // Reconoce "ene-25", "feb-26", etc. -> {label, sortKey} o null si no matchea
  function parseMonthLabel(cell) {
    if (!cell) return null;
    const m = String(cell).trim().toLowerCase().match(/^([a-z]+)[-\/](\d{2,4})$/);
    if (!m) return null;
    const monKey = m[1];
    if (!(monKey in MES_KEYS)) return null;
    let year = parseInt(m[2], 10);
    if (year < 100) year += 2000;
    const monIdx = MES_KEYS[monKey];
    return {
      label: MESES[monIdx] + ' ' + year,
      sortKey: year * 12 + monIdx
    };
  }

  function parseCSV(text) {
    const rows = [];
    let row = [], cur = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
        else if (c === '"') inQuotes = false;
        else cur += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(cur); cur = ''; }
        else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
        else if (c === '\r') { /* skip */ }
        else cur += c;
      }
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row); }
    return rows;
  }

  function toNumber(v) {
    if (v === undefined || v === null || v === '') return 0;
    let s = String(v).trim();
    if (s === '') return 0;
    // Formato argentino: "1.234.567,89" -> punto = miles, coma = decimal
    // Si tiene coma, asumimos que es el separador decimal
    if (s.indexOf(',') !== -1) {
      s = s.replace(/\./g, '').replace(',', '.');
    }
    s = s.replace(/[^0-9.\-]/g, '');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  function fmtUSD(n) {
    const abs = Math.abs(n);
    const formatted = abs.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    return (n < 0 ? '-$' : '$') + formatted;
  }

  async function fetchData() {
    try {
      const res = await fetch(csvURL + '&_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);
      processRows(rows);
      document.getElementById('last-update').textContent =
        'Actualizado ' + new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    } catch (e) {
      const dashVisible = document.getElementById('dashboard').style.display === 'block';
      if (dashVisible) {
        document.getElementById('last-update').textContent = '⚠️ Sin conexión — reintentando…';
      } else {
        document.getElementById('state-msg').textContent =
          '⚠️ No se pudo conectar con el Sheet "' + SHEET_NAME + '". Verificá que esté público y el nombre de la hoja sea exacto.';
        document.getElementById('state-msg').className = 'error';
      }
    }
  }

  function processRows(rows) {
    // La fila de encabezado con los meses es la primera fila con >= 3 celdas que matchean "ene-25" etc.
    let headerRowIdx = -1;
    for (let i = 0; i < Math.min(rows.length, 5); i++) {
      const matchCount = rows[i].filter(c => parseMonthLabel(c) !== null).length;
      if (matchCount >= 3) { headerRowIdx = i; break; }
    }
    if (headerRowIdx === -1) throw new Error('No se encontró fila de encabezado de meses');

    const headerRow = rows[headerRowIdx];
    monthCols = [];
    const seenSortKeys = new Set();
    headerRow.forEach((cell, idx) => {
      const parsed = parseMonthLabel(cell);
      if (parsed && !seenSortKeys.has(parsed.sortKey)) {
        seenSortKeys.add(parsed.sortKey);
        monthCols.push({ idx, label: parsed.label, sortKey: parsed.sortKey });
      }
    });
    monthCols.sort((a,b) => a.sortKey - b.sortKey);

    // Construir mapa label-fila -> valores
    dataRows = {};
    for (let r = headerRowIdx + 1; r < rows.length; r++) {
      const rowLabel = (rows[r][0] || '').trim();
      if (!rowLabel) continue;
      if (!dataRows[rowLabel]) {
        dataRows[rowLabel] = monthCols.map(c => toNumber(rows[r][c.idx]));
      }
    }

    if (selectedIdx === null) selectedIdx = monthCols.length - 1; // último mes por defecto
    if (rangeEnd === null) { rangeStart = 0; rangeEnd = monthCols.length - 1; }

    renderPeriodBar();
    renderAll();

    document.getElementById('state-msg').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  function renderPeriodBar() {
    const bar = document.getElementById('period-bar');
    bar.innerHTML = '';

    const label = document.createElement('span');
    label.className = 'period-label';
    label.textContent = mode === 'single' ? 'Período' : 'Desde / Hasta';
    bar.appendChild(label);

    if (mode === 'single') {
      monthCols.forEach((m, i) => {
        const chip = document.createElement('div');
        chip.className = 'period-chip' + (i === selectedIdx ? ' active' : '');
        chip.textContent = m.label;
        chip.onclick = () => { selectedIdx = i; renderPeriodBar(); renderAll(); };
        bar.appendChild(chip);
      });
    } else {
      monthCols.forEach((m, i) => {
        const chip = document.createElement('div');
        const inRange = i >= rangeStart && i <= rangeEnd;
        chip.className = 'period-chip' + (inRange ? ' active' : '');
        chip.textContent = m.label;
        chip.onclick = () => {
          if (rangeStart === rangeEnd && i !== rangeStart) {
            if (i < rangeStart) rangeStart = i; else rangeEnd = i;
          } else {
            rangeStart = i; rangeEnd = i;
          }
          renderPeriodBar(); renderAll();
        };
        bar.appendChild(chip);
      });
    }

    const divider = document.createElement('div');
    divider.className = 'period-divider';
    bar.appendChild(divider);

    const toggle = document.createElement('div');
    toggle.className = 'mode-toggle';
    const btnSingle = document.createElement('div');
    btnSingle.className = 'mode-btn' + (mode === 'single' ? ' active' : '');
    btnSingle.textContent = 'Mensual';
    btnSingle.onclick = () => { mode = 'single'; renderPeriodBar(); renderAll(); };
    const btnRange = document.createElement('div');
    btnRange.className = 'mode-btn' + (mode === 'range' ? ' active' : '');
    btnRange.textContent = 'Rango';
    btnRange.onclick = () => { mode = 'range'; renderPeriodBar(); renderAll(); };
    toggle.appendChild(btnSingle);
    toggle.appendChild(btnRange);
    bar.appendChild(toggle);
  }

  function sumRange(values, from, to) {
    let s = 0;
    for (let i = from; i <= to; i++) s += (values[i] || 0);
    return s;
  }

  function getValue(rowKey) {
    const values = dataRows[rowKey];
    if (!values) return 0;
    if (mode === 'single') return values[selectedIdx] || 0;
    return sumRange(values, rangeStart, rangeEnd);
  }

  function renderAll() {
    renderKPIs();
    renderTable();
  }

  function renderKPIs() {
    const ingresos = getValue('Total Ingresos por Ventas');
    const bruto    = getValue('Resultado Bruto');
    const ebitda   = getValue('EBITDA');
    const neto     = getValue('Resultado Neto');

    const margenBruto = ingresos !== 0 ? (bruto / ingresos * 100) : 0;
    const margenEbitda = ingresos !== 0 ? (ebitda / ingresos * 100) : 0;
    const margenNeto = ingresos !== 0 ? (neto / ingresos * 100) : 0;

    const kpis = [
      { label: 'Ingresos', value: ingresos, sub: null },
      { label: 'Resultado Bruto', value: bruto, sub: margenBruto.toFixed(1) + '% margen' },
      { label: 'EBITDA', value: ebitda, sub: margenEbitda.toFixed(1) + '% margen' },
      { label: 'Resultado Neto', value: neto, sub: margenNeto.toFixed(1) + '% margen' },
    ];

    const strip = document.getElementById('kpi-strip');
    strip.innerHTML = kpis.map(k => `
      <div class="kpi">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value ${k.value > 0 ? 'pos' : k.value < 0 ? 'neg' : 'neutral'}">${fmtUSD(k.value)}</div>
        ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
      </div>
    `).join('');
  }

  function renderTable() {
    const thead = document.getElementById('thead-row');
    const periodLabel = mode === 'single'
      ? monthCols[selectedIdx].label
      : monthCols[rangeStart].label + ' → ' + monthCols[rangeEnd].label;

    thead.innerHTML = `<tr><th>Concepto</th><th>${periodLabel}</th><th>% s/ Ingresos</th></tr>`;

    const ingresos = getValue('Total Ingresos por Ventas');
    const tbody = document.getElementById('tbody-data');
    tbody.innerHTML = ROW_MAP.map(r => {
      const val = getValue(r.key);
      const pct = ingresos !== 0 ? (val / ingresos * 100) : 0;
      const cls = r.type === 'highlight' ? 'highlight' : r.type === 'subtotal' ? 'subtotal' : '';
      const valCls = r.type === 'highlight' ? '' : (val > 0 ? 'pos' : val < 0 ? 'neg' : 'neutral');
      return `
        <tr class="${cls}">
          <td>${r.label}</td>
          <td class="${valCls}">${fmtUSD(val)}</td>
          <td class="dim">${pct.toFixed(1)}%</td>
        </tr>`;
    }).join('');

    document.getElementById('panel-sub').textContent = '· ' + periodLabel;
    document.getElementById('row-count').textContent = `${monthCols.length} períodos disponibles · datos en USD`;
  }

  function startCountdown() {
    clearInterval(timerID);
    countdown = INTERVAL;
    timerID = setInterval(() => {
      countdown--;
      const el = document.getElementById('countdown');
      if (el) el.textContent = countdown + 's';
      if (countdown <= 0) { countdown = INTERVAL; fetchData(); }
    }, 1000);
  }

  fetchData();
  startCountdown();
</script>
</body>
</html>
